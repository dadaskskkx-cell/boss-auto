job_title: "示例岗位"
job_description: |
  这里填写你本次要招聘的岗位 JD。
  实际使用时，建议通过 launch.command 在启动时重新输入。

llm_prompt: |
  你是一个专业的HR助手。请根据以下JD描述和候选人简历，评估候选人与岗位的匹配度。

  岗位：{job_title}
  JD：{job_description}

  候选人简历：
  {resume_text}

  请按以下格式输出：
  评分: <0-100的整数>
  理由: <一句话说明理由>
  建议: <matched 或 rejected>

questions:
  - "目前是在职还是离职状态？"
  - "期望薪资范围是多少？"
  - "最快多久可以到岗？"
rules:
  blacklist_keywords:
  - 外包
  - 劳务派遣
  - 培训
  reject_keywords: []
  llm_score_threshold: 60
  use_llm: false
  max_age: 45
  min_education: 不限
  min_experience: 0
  max_short_stints: 1
  min_keyword_hits: 1
  required_keywords_any:
  - 示例关键词
  keyword_pool:
  - 示例关键词
  - 第二关键词
  salary_range:
  - 15000
  - 50000
